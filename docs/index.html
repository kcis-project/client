<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>KCIS 연명부</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#f5f5f5;color:#111}
    header{background:#fff;border-bottom:1px solid #e8e8e8;padding:14px 28px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .knu-logo{width:36px;height:36px;object-fit:contain;flex-shrink:0}
    .header-title{display:flex;flex-direction:column;gap:1px}
    header h1{font-size:1.25rem;font-weight:900;color:#111;letter-spacing:-.03em;line-height:1}
    .count{font-size:.72rem;color:#aaa}
    #search{margin-left:auto;padding:8px 16px;border:1.5px solid #ddd;border-radius:20px;font-size:.88rem;width:220px;outline:none}
    #search:focus{border-color:#111}
    .hdr-btn{padding:8px 16px;color:#fff;border:none;border-radius:20px;font-size:.83rem;font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap}
    #join-btn{background:#111}
    #join-btn:hover{background:#333}
    .fbtn{padding:5px 13px;border-radius:18px;border:1.5px solid #ddd;background:#fff;font-size:.78rem;cursor:pointer;transition:all .15s;color:#555}
    .fbtn.active,.fbtn:hover{background:#111;color:#fff;border-color:#111}
    #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;padding:20px 28px 48px}
    .card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:.2s;border:1px solid #ebebeb;position:relative}
    .card:hover{box-shadow:0 4px 18px rgba(0,0,0,.12);transform:translateY(-2px)}
    .card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#333,#777);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1rem}
    .cname{font-size:.97rem;font-weight:700}
    .dept{font-size:.75rem;color:#999;margin-top:1px}
    .cur-badge{display:inline-flex;align-items:center;gap:5px;font-size:.78rem;color:#111;font-weight:600;background:#f0f0f0;padding:3px 9px;border-radius:7px;margin-bottom:8px}
    .cur-badge.active{background:#111;color:#fff}
    .co-logo{width:14px;height:14px;object-fit:contain;border-radius:2px;flex-shrink:0}
    .co-logo-lg{width:18px;height:18px}
    .exp-co{display:inline-flex;align-items:center;gap:3px;cursor:default;position:relative}
    .exp-co[data-domain]{cursor:pointer;border-bottom:1px dashed #ccc}
    .exp-co[data-domain]:hover{color:#111}
    .co-preview{position:absolute;bottom:calc(100% + 8px);left:0;background:#fff;border:1px solid #e0e0e0;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.14);padding:12px 14px;min-width:220px;z-index:500;display:none;pointer-events:none}
    .co-preview.show{display:block}
    .co-preview-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .co-preview-logo{width:28px;height:28px;object-fit:contain;border-radius:6px;border:1px solid #eee}
    .co-preview-name{font-weight:700;font-size:.88rem}
    .co-preview-meta{font-size:.73rem;color:#888;line-height:1.5}
    .sec-title{font-size:.72rem;color:#999;text-transform:uppercase;margin-top:10px;margin-bottom:4px;font-weight:600;letter-spacing:.04em}
    .exp-line,.edu-line,.cert-line,.act-line{font-size:.8rem;color:#444;margin:2px 0;line-height:1.4}
    .card-edit-btn{position:absolute;top:14px;right:14px;font-size:.73rem;color:#888;background:none;border:1px solid #e0e0e0;border-radius:6px;padding:2px 8px;cursor:pointer}
    .card-edit-btn:hover{background:#111;color:#fff;border-color:#111}

    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:1000;overflow-y:auto;padding:40px 16px}
    .overlay.open{display:flex}
    .modal-box{background:#fff;border-radius:14px;width:100%;max-width:640px;padding:28px;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.25)}
    .modal-close{position:absolute;top:14px;right:14px;background:none;border:none;font-size:1.3rem;cursor:pointer;color:#888}
    .modal-box h2{font-size:1.15rem;margin-bottom:18px;font-weight:800}

    .li-section{background:#f5f7ff;border:1px solid #dde3ff;border-radius:10px;padding:14px;margin-bottom:18px}
    .li-section-title{font-weight:700;font-size:.85rem;margin-bottom:6px;color:#3b4cdc}
    .li-section-desc{font-size:.78rem;color:#666;line-height:1.5;margin-bottom:10px}
    .li-bookmarklet{display:inline-block;background:#3b4cdc;color:#fff;padding:6px 12px;border-radius:6px;font-size:.83rem;font-weight:700;text-decoration:none;cursor:grab}
    .li-paste{width:100%;min-height:90px;border:1px solid #cfd5f5;border-radius:8px;padding:8px;font-size:.8rem;margin-top:8px;font-family:inherit;resize:vertical}
    .li-paste-btn{margin-top:6px;background:#fff;color:#3b4cdc;border:1px solid #3b4cdc;border-radius:6px;padding:5px 12px;font-size:.78rem;cursor:pointer;font-weight:600}
    .li-status{font-size:.75rem;color:#3b4cdc;margin-top:6px;min-height:1em}

    .form-field{margin-bottom:14px}
    .form-field label{display:block;font-size:.78rem;font-weight:600;color:#444;margin-bottom:5px}
    .form-field input[type=text],.form-field input[type=url]{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:.85rem;outline:none;font-family:inherit}
    .form-field input:focus{border-color:#111}
    .form-row{display:flex;gap:10px}
    .form-row .form-field{flex:1}
    .form-checkbox{display:flex;align-items:center;gap:6px;font-size:.83rem;color:#444}

    .dyn-section{margin-bottom:16px;padding:12px;border:1px solid #ececec;border-radius:9px}
    .dyn-title{font-weight:700;font-size:.85rem;margin-bottom:8px;color:#222}
    .dyn-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;margin-bottom:6px}
    .dyn-row input{padding:6px 9px;border:1px solid #ddd;border-radius:6px;font-size:.8rem;outline:none;font-family:inherit;min-width:0}
    .dyn-del{background:#f0f0f0;border:none;border-radius:6px;font-size:.85rem;cursor:pointer;color:#888;width:28px}
    .dyn-del:hover{background:#fee;color:#c44}
    .dyn-add{margin-top:4px;background:#fff;color:#555;border:1px dashed #ccc;border-radius:6px;padding:5px 12px;font-size:.78rem;cursor:pointer}
    .dyn-add:hover{background:#fafafa;color:#111;border-color:#111}

    .tag-select-wrap{display:flex;flex-wrap:wrap;gap:5px}
    .tag-opt{padding:4px 11px;border:1px solid #ddd;border-radius:14px;background:#fff;font-size:.74rem;cursor:pointer;color:#555}
    .tag-opt.selected{background:#111;color:#fff;border-color:#111}

    #modal-submit{width:100%;padding:11px;background:#111;color:#fff;border:none;border-radius:8px;font-size:.92rem;font-weight:700;cursor:pointer;margin-top:8px}
    #modal-submit:hover{background:#333}
    #modal-submit:disabled{background:#aaa;cursor:not-allowed}
    .form-msg{font-size:.8rem;text-align:center;margin-top:8px;min-height:1.2em}

    .ac-wrap{position:relative;width:100%}
    .ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:6px;max-height:260px;overflow-y:auto;display:none;z-index:10;margin-top:2px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .ac-list.open{display:block}
    .ac-item{padding:7px 10px;font-size:.8rem;cursor:pointer;border-bottom:1px solid #f4f4f4}
    .ac-item:last-child{border-bottom:none}
    .ac-item:hover,.ac-item.focused{background:#f3f5ff}
    .ac-item .ac-name{font-weight:600;color:#111}
    .ac-item .ac-meta{font-size:.72rem;color:#888;margin-top:1px}
    .empty{padding:60px 20px;text-align:center;color:#999;font-size:.9rem}

    body.modal-open{overflow:hidden}

    .filter-bar{padding:10px 28px;display:flex;gap:8px;flex-wrap:wrap;background:#fff;border-bottom:1px solid #ebebeb;align-items:center}
    .filter-drop{position:relative}
    .filter-drop .fbtn::after{content:' ▾';font-size:.65rem}
    .filter-drop-list{position:absolute;top:calc(100% + 4px);left:0;min-width:160px;max-height:240px;overflow-y:auto;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:none;z-index:200}
    .filter-drop-list.open{display:block}
    .filter-drop-item{padding:7px 12px;font-size:.8rem;cursor:pointer;color:#444}
    .filter-drop-item:hover,.filter-drop-item.active{background:#f3f3f3;color:#111;font-weight:600}
    .fbtn.toggle{background:#fff;border:1.5px solid #444;color:#444}
    .fbtn.toggle.active{background:#111;color:#fff;border-color:#111}

    .dyn-row.exp-row{grid-template-columns:1fr 1fr 1fr auto auto}
    .dyn-cur-chk{display:flex;align-items:center;gap:3px;font-size:.72rem;color:#666;white-space:nowrap}
    .dyn-cur-chk input{margin:0}
    .exp-current-badge{display:inline-block;background:#3b4cdc;color:#fff;font-size:.68rem;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:600}

    .view-toggle{display:flex;gap:4px;margin-left:12px}
    .view-btn{width:32px;height:32px;border:1.5px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .view-btn.active,.view-btn:hover{background:#111;border-color:#111}
    .view-btn.active svg,.view-btn:hover svg{stroke:#fff}
    .view-btn svg{width:16px;height:16px;stroke:#666;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

    #grid.list-view{display:flex!important;flex-direction:column;gap:0;padding:20px 28px 48px;grid-template-columns:none}
    .list-wrap{background:#fff;border-radius:14px;border:1px solid #ebebeb;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
    .list-item{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s}
    .list-item:last-of-type{border-bottom:none}
    .list-item:hover{background:#fafafa}
    .list-item .avatar{width:32px;height:32px;font-size:.85rem}
    .list-item-main{flex:1;display:flex;align-items:center;gap:10px;min-width:0}
    .list-item-name{font-weight:700;font-size:.9rem;white-space:nowrap}
    .list-item-dept{font-size:.78rem;color:#888;white-space:nowrap}
    .list-item-company{font-size:.8rem;color:#444;margin-left:auto;white-space:nowrap}
    .list-item-badge{font-size:.7rem;background:#111;color:#fff;padding:2px 7px;border-radius:5px;margin-left:6px}
    .list-detail{display:none;padding:8px 18px 14px 64px;border-bottom:1px solid #f0f0f0;font-size:.8rem;color:#555;line-height:1.6;background:#fafafa}
    .list-detail.open{display:block}
    .list-detail-line{margin:2px 0}

    #grid.table-view{display:block!important;padding:20px 28px 48px;overflow-x:auto;grid-template-columns:none}
    .tbl-wrap{background:#fff;border-radius:14px;border:1px solid #ebebeb;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
    .tbl{width:100%;border-collapse:collapse;font-size:.82rem}
    .tbl th{text-align:left;padding:10px 14px;border-bottom:2px solid #eee;font-size:.75rem;color:#888;font-weight:600;white-space:nowrap;background:#fafafa}
    .tbl td{padding:10px 14px;border-bottom:1px solid #f4f4f4;vertical-align:top}
    .tbl tr:hover td{background:#f8f9ff}
    .tbl .td-name{font-weight:700;white-space:nowrap}
    .tbl .td-badge{display:inline-block;font-size:.68rem;background:#111;color:#fff;padding:1px 6px;border-radius:4px}
    .tbl .td-exp{font-size:.75rem;color:#666;line-height:1.4}
    .tbl .td-edit{font-size:.72rem;color:#888;cursor:pointer;border:1px solid #e0e0e0;border-radius:5px;padding:2px 7px;background:none}
    .tbl .td-edit:hover{background:#111;color:#fff;border-color:#111}
  </style>
</head>
<body>
<header>
  <img src="https://www.google.com/s2/favicons?domain=knu.ac.kr&sz=64" class="knu-logo" alt="경북대">
  <div class="header-title"><h1>KCIS</h1><span class="count" id="cnt"></span></div>
  <input id="search" type="text" placeholder="이름·학과·회사 통합 검색…">
  <div class="view-toggle">
    <button class="view-btn active" data-view="card" title="카드"><svg><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg></button>
    <button class="view-btn" data-view="list" title="리스트"><svg><line x1="1" y1="3" x2="15" y2="3"/><line x1="1" y1="8" x2="15" y2="8"/><line x1="1" y1="13" x2="15" y2="13"/></svg></button>
    <button class="view-btn" data-view="table" title="테이블"><svg><rect x="1" y="1" width="14" height="14" rx="1"/><line x1="1" y1="5.5" x2="15" y2="5.5"/><line x1="1" y1="10" x2="15" y2="10"/><line x1="6" y1="1" x2="6" y2="15"/></svg></button>
  </div>
  <button id="join-btn" class="hdr-btn">인원 등록</button>
</header>
<div class="filter-bar" id="fbar">
  <button class="fbtn active" data-filter="" id="f-all">전체</button>
  <button class="fbtn toggle" id="f-current-toggle">현업자</button>
  <div class="filter-drop" id="fd-dept">
    <button class="fbtn" id="fb-dept">학과</button>
    <div class="filter-drop-list" id="fdl-dept"></div>
  </div>
  <div class="filter-drop" id="fd-year">
    <button class="fbtn" id="fb-year">연도</button>
    <div class="filter-drop-list" id="fdl-year"></div>
  </div>
  <div class="filter-drop" id="fd-job">
    <button class="fbtn" id="fb-job">업종</button>
    <div class="filter-drop-list" id="fdl-job"></div>
  </div>
</div>
<div id="grid"></div>

<!-- 인원 등록/수정 모달 -->
<div id="modal-overlay" class="overlay">
<div id="modal" class="modal-box">
  <button class="modal-close" title="닫기">✕</button>
  <h2 id="modal-title">인원 정보 등록</h2>

  <div class="li-section" id="li-section">
    <div class="li-section-title">LinkedIn에서 가져오기 (선택)</div>
    <div class="li-section-desc">
      ① 아래 <b>북마크릿</b>을 북마크바에 드래그 → ② 본인 LinkedIn 프로필 페이지로 이동 →
      ③ 북마크 클릭 시 KCIS 등록 페이지가 새 창으로 열리며 폼이 자동으로 채워집니다.
    </div>
    <a id="bookmarklet-link" class="li-bookmarklet" href="#">📎 KCIS LinkedIn 가져오기</a>
    <div class="li-section-desc" style="margin-top:12px">
      또는, LinkedIn 프로필을 <b>Ctrl/Cmd+A → 복사</b> 후 아래에 붙여넣으세요.
    </div>
    <textarea id="li-paste" class="li-paste" placeholder="LinkedIn 프로필 텍스트 붙여넣기..."></textarea>
    <button id="li-paste-btn" class="li-paste-btn">붙여넣은 텍스트로 채우기</button>
    <div id="li-status" class="li-status"></div>
  </div>

  <div class="form-field">
    <label>이름 *</label>
    <input id="f-name" type="text" placeholder="홍길동">
  </div>
  <div class="form-row">
    <div class="form-field">
      <label>학과</label>
      <input id="f-dept" type="text" placeholder="컴퓨터학부" autocomplete="off">
    </div>
    <div class="form-field">
      <label>졸업/입학 연도</label>
      <input id="f-year" type="text" placeholder="19">
    </div>
  </div>
  <div class="form-row">
    <div class="form-field">
      <label>현재 소속</label>
      <input id="f-current" type="text" placeholder="회사명" autocomplete="off">
    </div>
    <div class="form-field" style="flex:0 0 110px">
      <label>현직 여부</label>
      <label class="form-checkbox" style="padding-top:8px"><input id="f-is-current" type="checkbox"> 현직자</label>
    </div>
  </div>
  <div class="form-field">
    <label>LinkedIn URL</label>
    <input id="f-linkedin" type="url" placeholder="https://www.linkedin.com/in/username">
  </div>

  <div class="dyn-section">
    <div class="dyn-title">경력</div>
    <div id="exp-rows"></div>
    <button id="add-exp" class="dyn-add" type="button">+ 직장 추가</button>
  </div>

  <div class="dyn-section">
    <div class="dyn-title">학력</div>
    <div id="edu-rows"></div>
    <button id="add-edu" class="dyn-add" type="button">+ 학력 추가</button>
  </div>

  <div class="dyn-section">
    <div class="dyn-title">활동 / 수상</div>
    <div id="act-rows"></div>
    <button id="add-act" class="dyn-add" type="button">+ 활동 추가</button>
  </div>

  <div class="dyn-section">
    <div class="dyn-title">자격증</div>
    <div id="cert-rows"></div>
    <button id="add-cert" class="dyn-add" type="button">+ 자격증 추가</button>
  </div>

  <div class="dyn-section">
    <div class="dyn-title">업종 / 관심 분야 <span style="font-weight:400;color:#aaa;font-size:.75rem">(복수 선택)</span></div>
    <div class="tag-select-wrap" id="job-tag-select"></div>
  </div>

  <button id="modal-submit" type="button">제출하기</button>
  <div class="form-msg" id="form-msg"></div>
</div>
</div>

<script>
// ── 설정 ────────────────────────────────────────────────────────
// 운영 API 는 nip.io 호스트네임 + Let's Encrypt 인증서로 HTTPS 제공.
// GitHub Pages 가 HTTPS 라서 Mixed Content 회피용으로 도메인 + TLS 가 필수.
const API_BASE = (() => {
  const h = location.hostname;
  if (h === 'localhost' || h === '127.0.0.1' || h === '') return 'http://localhost:3000';
  return 'https://168-107-46-23.nip.io';
})();

const JOB_TAGS = [
  '금융','공공정책','법률','마케팅','광고','디자인','컨설팅','컴퓨터/IT','데이터',
  '연구','학계','국내정치','국가안보','국제기구','농업','언론','전략',
  'ESG','개발','경영지원','인사','총무','물류','무역','교육','통계',
  '관광','보험','자산운용업','철강','바이오','과학산업','반도체','증권사',
  '배터리','자동차','부품','타이어','사업개발','인플루언서','게임',
  '투자','심사','기후','제조업','보안','생산기술','품질','방위산업',
  'MD','생산관리','설계','로봇','SW개발','미들웨어','영상',
];

// ── 전역 상태 ──────────────────────────────────────────────────
let ALL_MEMBERS = [];
let DEPARTMENTS = [];
let editingId = null;  // null 이면 신규, hex string 이면 수정

// ── 기업 로고/도메인 매핑 ─────────────────────────────────────
const CO_DOMAIN = {
  '삼성전자':'samsung.com','삼성SDS':'samsungsds.com','삼성SDI':'samsungsdi.com',
  '삼성바이오로직스':'samsungbiologics.com','삼성증권':'samsungpop.com',
  '삼성생명':'samsunglife.com','삼성화재':'samsungfire.com',
  'LG전자':'lg.com','LG이노텍':'lginnotek.com','LG에너지솔루션':'lgensol.com',
  'LG CNS':'lgcns.com','LG화학':'lgchem.com',
  '현대자동차':'hyundai.com','현대모비스':'mobis.co.kr','현대건설':'hdec.kr',

let COMPANIES_CACHE = {};

function getLogoDomain(name) {
  if (!name) return '';
  const clean = name.replace(/\s*(주식회사|유한회사|\(주\)|\(유\)|㈜|㈔)\s*/g,'').trim();
  if (CO_DOMAIN[clean]) return CO_DOMAIN[clean];
  for (const [kw, domain] of GROUP_KW) {
    if (clean.includes(kw)) return domain;
  }
  return '';
}

function logoImg(name, cls) {
  const d = getLogoDomain(name);
  return d ? `<img class="co-logo ${cls||''}" src="https://www.google.com/s2/favicons?domain=${d}&sz=64" alt="" onerror="this.style.display='none'">` : '';
}

async function loadCompaniesCache() {
  try {
    const list = await api('/api/companies');
    list.forEach(c => { COMPANIES_CACHE[c.name.toLowerCase()] = c; });
  } catch(e) {}
}

function findCompanyInfo(name) {
  if (!name) return null;
  const n = name.toLowerCase().replace(/\s*(주식회사|유한회사|\(주\)|\(유\)|㈜|㈔)\s*/g,'').trim();
  if (COMPANIES_CACHE[n]) return COMPANIES_CACHE[n];
  for (const key in COMPANIES_CACHE) {
    if (n.includes(key) || key.includes(n)) return COMPANIES_CACHE[key];
  }
  return null;
}

// ── HTTP 헬퍼 ──────────────────────────────────────────────────
async function api(path, opts = {}) {
  const r = await fetch(API_BASE + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!r.ok) throw new Error(`${r.status}: ${await r.text().catch(()=>r.statusText)}`);
  if (r.status === 204) return null;
  return r.json();
}

function av(n) { return (n || '?')[0]; }

function renderExpCompany(name) {
  const domain = getLogoDomain(name);
  const logo = logoImg(name);
  const info = findCompanyInfo(name);
  const dataAttr = domain ? ` data-domain="${domain}"` : '';
  const previewData = info
    ? { name: info.name, industry: info.industry || '', established: info.established || '' }
    : domain ? { name, industry: '', established: '' } : null;
  const dataInfo = previewData ? ` data-co="${escapeHtml(JSON.stringify(previewData))}"` : '';
  return `<span class="exp-co"${dataAttr}${dataInfo}>${logo}${escapeHtml(name)}</span>`;
}

function renderCard(m) {
  const exps = (m.experiences || []).map(e => {
    const co = e.company ? renderExpCompany(e.company) : '';
    const rest = [e.role, e.period].filter(Boolean).join(' / ');
    const cur = e.is_current ? '<span class="exp-current-badge">현재</span>' : '';
    return `<div class="exp-line">· ${co}${rest ? ' / ' + escapeHtml(rest) : ''}${cur}</div>`;
  }).join('');
  const edu  = (m.education   || []).map(e => `<div class="edu-line">· ${escapeHtml([e.school, e.major, e.period].filter(Boolean).join(' / '))}</div>`).join('');
  const acts = (m.etc         || []).map(a => { const t = typeof a === 'string' ? a : [a.name, a.role, a.period].filter(Boolean).join(' / '); return t ? `<div class="act-line">· ${escapeHtml(t)}</div>` : ''; }).join('');
  const cert = (m.certs       || []).map(c => `<div class="cert-line">· ${escapeHtml([c.name, c.issuer, c.date].filter(Boolean).join(' / '))}</div>`).join('');
  const badgeClass = m.is_current ? 'cur-badge active' : 'cur-badge';
  const curLogo = logoImg(m.current_company);

  return `<div class="card">
    <button class="card-edit-btn" data-edit="${m.id}">✏ 수정</button>
    <div class="card-top">
      <div class="avatar">${escapeHtml(av(m.name))}</div>
      <div><div class="cname">${escapeHtml(m.name || '')}</div>
        <div class="dept">${escapeHtml([m.dept, m.year].filter(Boolean).join(' · '))}</div></div>
    </div>
    ${m.current_company ? `<div class="${badgeClass}">${curLogo}${escapeHtml(m.current_company)}${m.is_current ? ' · 현직' : ''}</div>` : ''}
    ${m.job_type ? `<div class="sec-title">업종</div><div class="exp-line">${escapeHtml(m.job_type)}</div>` : ''}
    ${exps  ? `<div class="sec-title">경력</div>${exps}` : ''}
    ${edu   ? `<div class="sec-title">학력</div>${edu}` : ''}
    ${acts  ? `<div class="sec-title">활동/수상</div>${acts}` : ''}
    ${cert  ? `<div class="sec-title">자격증</div>${cert}` : ''}
  </div>`;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

let VIEW_MODE = 'card';

function render(list) {
  const grid = document.getElementById('grid');
  document.getElementById('cnt').textContent = `${list.length}명`;
  if (!list.length) {
    grid.innerHTML = '<div class="empty">아직 등록된 인원이 없습니다.</div>';
    grid.className = '';
    return;
  }

  grid.className = VIEW_MODE === 'list' ? 'list-view' : VIEW_MODE === 'table' ? 'table-view' : '';
  grid.id = 'grid';

  if (VIEW_MODE === 'card') {
    grid.innerHTML = list.map(renderCard).join('');
  } else if (VIEW_MODE === 'list') {
    grid.innerHTML = '<div class="list-wrap">' + list.map(renderListItem).join('') + '</div>';
    grid.querySelectorAll('.list-item').forEach(item => {
      item.addEventListener('click', () => {
        const detail = item.nextElementSibling;
        if (detail && detail.classList.contains('list-detail'))
          detail.classList.toggle('open');
      });
    });
  } else {
    grid.innerHTML = '<div class="tbl-wrap">' + renderTable(list) + '</div>';
  }

  grid.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); openEditModal(btn.dataset.edit); });
  });

  grid.querySelectorAll('.exp-co[data-co]').forEach(el => {
    let preview = null;
    el.addEventListener('mouseenter', () => {
      try {
        const info = JSON.parse(el.dataset.co);
        const domain = el.dataset.domain || '';
        const logoUrl = domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=128` : '';
        preview = document.createElement('div');
        preview.className = 'co-preview show';
        preview.innerHTML = `<div class="co-preview-head">${logoUrl ? `<img class="co-preview-logo" src="${logoUrl}" onerror="this.remove()">` : ''}<span class="co-preview-name">${escapeHtml(info.name)}</span></div><div class="co-preview-meta">${[info.industry, info.established ? '설립 ' + info.established : ''].filter(Boolean).join(' · ') || '등록된 기업'}</div>`;
        el.appendChild(preview);
      } catch(e) {}
    });
    el.addEventListener('mouseleave', () => {
      if (preview) { preview.remove(); preview = null; }
    });
  });
}

function renderListItem(m) {
  const curBadge = m.is_current ? '<span class="list-item-badge">현직</span>' : '';
  const exps = (m.experiences || []).slice(0, 3).map(e => {
    const cur = e.is_current ? ' [현재]' : '';
    return `<div class="list-detail-line">· ${escapeHtml([e.company, e.role, e.period].filter(Boolean).join(' / '))}${cur}</div>`;
  }).join('');
  return `<div class="list-item">
    <div class="avatar">${escapeHtml(av(m.name))}</div>
    <div class="list-item-main">
      <span class="list-item-name">${escapeHtml(m.name)}</span>
      <span class="list-item-dept">${escapeHtml([m.dept, m.year].filter(Boolean).join(' · '))}</span>
      <span class="list-item-company">${logoImg(m.current_company)}${escapeHtml(m.current_company || '')}${curBadge}</span>
    </div>
    <button class="card-edit-btn" data-edit="${m.id}">✏</button>
  </div>
  <div class="list-detail">${exps || '<span style="color:#bbb">경력 정보 없음</span>'}</div>`;
}

function renderTable(list) {
  const rows = list.map(m => {
    const expText = (m.experiences || []).slice(0, 2).map(e =>
      [e.company, e.role, e.period].filter(Boolean).join(' / ')
    ).join('<br>');
    const curBadge = m.is_current ? ' <span class="td-badge">현직</span>' : '';
    return `<tr>
      <td class="td-name">${escapeHtml(m.name)}</td>
      <td>${escapeHtml(m.dept || '')}</td>
      <td>${escapeHtml(m.current_company || '')}${curBadge}</td>
      <td>${escapeHtml(m.job_type || '')}</td>
      <td class="td-exp">${expText}</td>
      <td><button class="td-edit" data-edit="${m.id}">수정</button></td>
    </tr>`;
  }).join('');
  return `<table class="tbl"><thead><tr><th>이름</th><th>학과</th><th>현재소속</th><th>업종</th><th>주요 경력</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}

const FILTER_STATE = { is_current: false, dept: '', year: '', job_type: '' };

function buildFilters() {
  const deptList = document.getElementById('fdl-dept');
  const yearList = document.getElementById('fdl-year');
  const jobList = document.getElementById('fdl-job');

  const depts = [...new Set(ALL_MEMBERS.map(m => m.dept).filter(Boolean))].sort();
  const years = [...new Set(ALL_MEMBERS.map(m => m.year).filter(Boolean))].sort();
  const jobs = [...new Set(ALL_MEMBERS.flatMap(m => (m.job_type || '').split(/\s*,\s*/).filter(Boolean)))].sort();

  function fillDropdown(listEl, items, key) {
    listEl.innerHTML = '<div class="filter-drop-item" data-val="">전체</div>' +
      items.map(v => `<div class="filter-drop-item" data-val="${escapeHtml(v)}">${escapeHtml(v)}</div>`).join('');
    listEl.querySelectorAll('.filter-drop-item').forEach(el => {
      el.addEventListener('click', () => {
        FILTER_STATE[key] = el.dataset.val;
        listEl.classList.remove('open');
        const btn = listEl.parentElement.querySelector('.fbtn');
        btn.textContent = el.dataset.val || (key === 'dept' ? '학과' : key === 'year' ? '연도' : '업종');
        btn.classList.toggle('active', !!el.dataset.val);
        applyFilter();
      });
    });
  }

  fillDropdown(deptList, depts, 'dept');
  fillDropdown(yearList, years, 'year');
  fillDropdown(jobList, jobs, 'job_type');
}

function setupFilterEvents() {
  document.getElementById('f-all').addEventListener('click', () => {
    FILTER_STATE.is_current = false;
    FILTER_STATE.dept = '';
    FILTER_STATE.year = '';
    FILTER_STATE.job_type = '';
    document.getElementById('f-current-toggle').classList.remove('active');
    document.getElementById('fb-dept').textContent = '학과';
    document.getElementById('fb-dept').classList.remove('active');
    document.getElementById('fb-year').textContent = '연도';
    document.getElementById('fb-year').classList.remove('active');
    document.getElementById('fb-job').textContent = '업종';
    document.getElementById('fb-job').classList.remove('active');
    applyFilter();
  });

  document.getElementById('f-current-toggle').addEventListener('click', () => {
    FILTER_STATE.is_current = !FILTER_STATE.is_current;
    document.getElementById('f-current-toggle').classList.toggle('active', FILTER_STATE.is_current);
    applyFilter();
  });

  ['dept','year','job'].forEach(key => {
    const btn = document.getElementById('fb-' + key);
    const list = document.getElementById('fdl-' + key);
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.filter-drop-list.open').forEach(l => { if (l !== list) l.classList.remove('open'); });
      list.classList.toggle('open');
    });
  });

  document.addEventListener('click', () => {
    document.querySelectorAll('.filter-drop-list.open').forEach(l => l.classList.remove('open'));
  });
}

function applyFilter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = ALL_MEMBERS.filter(m => {
    if (FILTER_STATE.is_current && !m.is_current) return false;
    if (FILTER_STATE.dept && m.dept !== FILTER_STATE.dept) return false;
    if (FILTER_STATE.year && m.year !== FILTER_STATE.year) return false;
    if (FILTER_STATE.job_type) {
      const memberJobs = (m.job_type || '').split(/\s*,\s*/);
      if (!memberJobs.includes(FILTER_STATE.job_type)) return false;
    }
    if (!q) return true;
    const hay = [m.name, m.dept, m.current_company, m.job_type,
      ...(m.experiences || []).map(e => e.company + ' ' + e.role)].join(' ').toLowerCase();
    return hay.includes(q);
  });
  render(filtered);
}
document.getElementById('search').addEventListener('input', applyFilter);
setupFilterEvents();

  const m = ALL_MEMBERS.find(x => x.id === id);
  if (!m) return;
  editingId = id;
  resetForm();
  document.getElementById('modal-title').textContent = '인원 정보 수정';
  document.getElementById('f-name').value = m.name || '';
  document.getElementById('f-dept').value = m.dept || '';
  document.getElementById('f-year').value = m.year || '';
  document.getElementById('f-current').value = m.current_company || '';
  document.getElementById('f-is-current').checked = !!m.is_current;
  document.getElementById('f-linkedin').value = m.linkedin || '';

  const tagSet = new Set((m.job_type || '').split(/\s*,\s*/).filter(Boolean));
  document.querySelectorAll('.tag-opt').forEach(el => el.classList.toggle('selected', tagSet.has(el.dataset.tag)));

  fillSection('exp-rows', m.experiences);
  fillSection('edu-rows', m.education);
  fillSection('act-rows', m.etc);
  fillSection('cert-rows', m.certs);

  document.body.classList.add('modal-open');
  overlay.classList.add('open');
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.classList.remove('modal-open');
  editingId = null;
}

function addRow(sectionId, vals) {
  vals = vals || {};
  const fields = ROW_CONFIG[sectionId];
  const row = document.createElement('div');
  row.className = 'dyn-row' + (sectionId === 'exp-rows' ? ' exp-row' : '');
  fields.forEach(f => {
    const inp = document.createElement('input');
    inp.type = 'text'; inp.name = f.n; inp.placeholder = f.p;
    inp.value = vals[f.n] || '';
    row.appendChild(inp);
  });

  if (sectionId === 'exp-rows') {
    const chkWrap = document.createElement('label');
    chkWrap.className = 'dyn-cur-chk';
    const chk = document.createElement('input');
    chk.type = 'checkbox'; chk.name = 'is_current';
    chk.checked = !!vals.is_current;
    chkWrap.appendChild(chk);
    chkWrap.appendChild(document.createTextNode('현재'));
    row.appendChild(chkWrap);
  }

  const del = document.createElement('button');
  del.type = 'button'; del.className = 'dyn-del'; del.textContent = '✕';
  del.addEventListener('click', () => row.remove());
  row.appendChild(del);

  document.getElementById(sectionId).appendChild(row);

  if (sectionId === 'exp-rows') {
    const compInput = row.querySelector('input[name="company"]');
    if (compInput) attachCompanyAutocomplete(compInput);
  }
}

function fillSection(sectionId, items) {
  document.getElementById(sectionId).innerHTML = '';
  const rows = items && items.length ? items : [{}];
  rows.forEach(r => addRow(sectionId, r));
}

// ── 회사 autocomplete (디바운스 300ms, /api/companies/search) ─
function attachCompanyAutocomplete(input) {
  const wrap = document.createElement('div');
  wrap.className = 'ac-wrap';
  input.parentNode.insertBefore(wrap, input);
  wrap.appendChild(input);
  input.style.width = '100%';

  const list = document.createElement('div');
  list.className = 'ac-list';
  wrap.appendChild(list);

  let timer = null, items = [], focused = -1;

  function hide() { list.classList.remove('open'); focused = -1; }

  function render(rows) {
    items = rows;
    list.innerHTML = '';
    if (!rows.length) { hide(); return; }
    rows.forEach((c, i) => {
      const el = document.createElement('div');
      el.className = 'ac-item';
      const meta = [c.industry, c.established].filter(Boolean).join(' · ');
      el.innerHTML = `<div class="ac-name">${escapeHtml(c.name)}</div>${meta ? `<div class="ac-meta">${escapeHtml(meta)}</div>` : ''}`;
      el.addEventListener('mousedown', e => { e.preventDefault(); input.value = c.name; hide(); });
      list.appendChild(el);
    });
    focused = -1;
    list.classList.add('open');
  }

  function moveFocus(d) {
    const els = list.querySelectorAll('.ac-item');
    focused = Math.max(0, Math.min(els.length - 1, focused + d));
    els.forEach((e, i) => e.classList.toggle('focused', i === focused));
  }

  input.addEventListener('input', () => {
    clearTimeout(timer);
    const q = input.value.trim();
    if (q.length < 1) { hide(); return; }
    timer = setTimeout(async () => {
      try { render(await api('/api/companies/search?q=' + encodeURIComponent(q))); }
      catch (e) { console.warn(e); }
    }, 300);
  });

  input.addEventListener('keydown', e => {
    if (!list.classList.contains('open')) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); moveFocus(1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); moveFocus(-1); }
    else if (e.key === 'Enter' && focused >= 0) { e.preventDefault(); input.value = items[focused].name; hide(); }
    else if (e.key === 'Escape') hide();
  });

  input.addEventListener('blur', () => setTimeout(hide, 150));
}

attachCompanyAutocomplete(document.getElementById('f-current'));

// ── 학과 autocomplete ─────────────────────────────────────────

  const wrap = document.createElement('div');
  wrap.className = 'ac-wrap';
  input.parentNode.insertBefore(wrap, input);
  wrap.appendChild(input);
  input.style.width = '100%';

  const list = document.createElement('div');
  list.className = 'ac-list';
  wrap.appendChild(list);

  let items = [], focused = -1;
  function hide() { list.classList.remove('open'); focused = -1; }
  function render(rows) {
    items = rows; list.innerHTML = '';
    if (!rows.length) { hide(); return; }
    rows.forEach(d => {
      const el = document.createElement('div');
      el.className = 'ac-item';
      el.innerHTML = `<div class="ac-name">${escapeHtml(d.name)}</div><div class="ac-meta">${escapeHtml(d.college || '')}</div>`;
      el.addEventListener('mousedown', e => { e.preventDefault(); input.value = d.name; hide(); });
      list.appendChild(el);
    });
    focused = -1; list.classList.add('open');
  }

  input.addEventListener('input', () => {

    render(matched);
  });

  input.addEventListener('keydown', e => {
    if (!list.classList.contains('open')) return;
    const els = list.querySelectorAll('.ac-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); focused = Math.min(els.length - 1, focused + 1); els.forEach((x,i)=>x.classList.toggle('focused', i===focused)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); focused = Math.max(0, focused - 1); els.forEach((x,i)=>x.classList.toggle('focused', i===focused)); }
    else if (e.key === 'Enter' && focused >= 0) { e.preventDefault(); input.value = items[focused].name; hide(); }
    else if (e.key === 'Escape') hide();
  });
  input.addEventListener('blur', () => setTimeout(hide, 150));
}

// ── LinkedIn 텍스트 폴백 파싱 ──────────────────────────────────
function parseLinkedInText(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const out = { name: '', headline: '', experiences: [], education: [], certs: [] };

  // 첫 줄이 이름인 경우가 많음 (LinkedIn 프로필 헤더)
  if (lines.length) out.name = lines[0];
  if (lines.length > 1) out.headline = lines[1];

  // 섹션 분리
  const idxExp = lines.findIndex(l => /^(Experience|경력)$/i.test(l));
  const idxEdu = lines.findIndex(l => /^(Education|학력)$/i.test(l));
  const idxCert = lines.findIndex(l => /^(Licenses & certifications|자격증)$/i.test(l));

  function sliceBetween(start, ends) {
    if (start < 0) return [];
    const end = ends.filter(e => e > start).sort((a,b)=>a-b)[0] || lines.length;
    return lines.slice(start + 1, end);
  }

  function groupItems(slice) {
    // 연도가 포함된 줄을 구분점으로 사용
    const items = [];
    let cur = [];
    slice.forEach(l => {
      if (cur.length && /\d{4}/.test(l)) {
        cur.push(l);
        items.push(cur); cur = [];
      } else { cur.push(l); }
    });
    if (cur.length) items.push(cur);
    return items.filter(g => g.length > 0).map(g => {
      const dedup = [...new Set(g)];
      return dedup;
    });
  }

  groupItems(sliceBetween(idxExp, [idxEdu, idxCert])).forEach(g => {
    const period = g.find(s => /\d{4}/.test(s)) || '';
    out.experiences.push({ role: g[0] || '', company: (g[1] || '').replace(/\s*·.*$/, ''), period });
  });

  groupItems(sliceBetween(idxEdu, [idxExp, idxCert])).forEach(g => {
    const period = g.find(s => /\d{4}/.test(s)) || '';
    out.education.push({ school: g[0] || '', major: g[1] || '', period });
  });

  groupItems(sliceBetween(idxCert, [idxExp, idxEdu])).forEach(g => {
    out.certs.push({ name: g[0] || '', issuer: g[1] || '', date: g.find(s => /\d{4}/.test(s)) || '' });
  });

  return out;
}

function prefillFromLinkedIn(d) {
  if (d.name && !document.getElementById('f-name').value) document.getElementById('f-name').value = d.name;
  if (d.linkedin && !document.getElementById('f-linkedin').value) document.getElementById('f-linkedin').value = d.linkedin;
  if (d.current_company && !document.getElementById('f-current').value) document.getElementById('f-current').value = d.current_company;
  if (d.experiences && d.experiences.length) fillSection('exp-rows', d.experiences);
  if (d.education && d.education.length) fillSection('edu-rows', d.education);
  if (d.certs && d.certs.length) fillSection('cert-rows', d.certs);
  document.getElementById('li-status').textContent = '자동으로 채웠습니다. 내용을 확인 후 저장하세요.';
}

document.getElementById('li-paste-btn').addEventListener('click', () => {
  const text = document.getElementById('li-paste').value.trim();
  if (!text) { document.getElementById('li-status').textContent = '먼저 LinkedIn 프로필 텍스트를 붙여넣으세요.'; return; }
  try { prefillFromLinkedIn(parseLinkedInText(text)); }
  catch (e) { document.getElementById('li-status').textContent = '파싱 실패: ' + e.message; }
});

// 부킷마크릿 → URL 파라미터 (?linkedin=<json>) 로 전달
(function handleBookmarkletPayload() {
  const params = new URLSearchParams(location.search);
  const raw = params.get('linkedin');
  if (!raw) return;
  try {
    const data = JSON.parse(decodeURIComponent(raw));
    openNewModal();
    setTimeout(() => prefillFromLinkedIn(data), 0);
    // URL 정리
    history.replaceState({}, '', location.pathname);
  } catch (e) {
    console.warn('LinkedIn payload 파싱 실패', e);
  }
})();

// 부킷마크릿 href 동적 생성
async function buildBookmarklet() {
  try {
    const r = await fetch('./bookmarklet.js');
    if (!r.ok) return;
    let src = await r.text();
    const here = location.origin + location.pathname.replace(/[^/]*$/, '');
    src = src.replace(/['"]https:\/\/kcis-project\.github\.io\/?['"]/, JSON.stringify(here));
    // 주석/공백 압축 (대충)
    const min = src.replace(/\/\*[\s\S]*?\*\//g, '').replace(/\s+/g, ' ').trim();
    document.getElementById('bookmarklet-link').href = 'javascript:' + encodeURI(min);
  } catch (e) { console.warn('부킷마크릿 빌드 실패', e); }
}
buildBookmarklet();

// ── 제출 ───────────────────────────────────────────────────────
function collectRows(sectionId) {
  const fields = ROW_CONFIG[sectionId].map(f => f.n);
  return Array.from(document.getElementById(sectionId).querySelectorAll('.dyn-row'))
    .map(row => {
      const obj = {};
      fields.forEach(f => {
        const inp = row.querySelector(`input[name="${f}"]`);
        obj[f] = inp ? inp.value.trim() : '';
      });
      if (sectionId === 'exp-rows') {
        const chk = row.querySelector('input[name="is_current"]');
        obj.is_current = chk ? chk.checked : false;
      }
      return obj;
    })
    .filter(obj => fields.some(f => obj[f]));
}

document.getElementById('modal-submit').addEventListener('click', async () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('form-msg').textContent = '이름은 필수입니다'; return; }

  const tags = [...document.querySelectorAll('.tag-opt.selected')].map(el => el.dataset.tag);
  const payload = {
    name,
    dept: document.getElementById('f-dept').value.trim(),
    year: document.getElementById('f-year').value.trim(),
    job_type: tags.join(', '),
    current_company: document.getElementById('f-current').value.trim(),
    is_current: document.getElementById('f-is-current').checked,
    linkedin: document.getElementById('f-linkedin').value.trim(),
    experiences: collectRows('exp-rows'),
    education:   collectRows('edu-rows'),
    etc:         collectRows('act-rows'),
    certs:       collectRows('cert-rows'),
    awards:      [],
  };

  const btn = document.getElementById('modal-submit');
  btn.disabled = true; btn.textContent = '저장 중…';
  try {
    if (editingId) {
      await api('/api/members/' + editingId, { method: 'PUT', body: JSON.stringify(payload) });
    } else {
      await api('/api/members', { method: 'POST', body: JSON.stringify(payload) });
    }
    document.getElementById('form-msg').style.color = '#3b4cdc';
    document.getElementById('form-msg').textContent = '저장되었습니다.';
    await loadMembers();
    setTimeout(closeModal, 1200);
  } catch (e) {
    document.getElementById('form-msg').style.color = '#e55';
    document.getElementById('form-msg').textContent = '저장 실패: ' + e.message;
  } finally {
    btn.disabled = false; btn.textContent = '제출하기';
  }
});
